<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#172a3a"/>
    </linearGradient>
    <linearGradient id="claw" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6ee7ff"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="220" fill="url(#bg)"/>

  <!-- Badge circle -->
  <circle cx="512" cy="480" r="330" fill="#0f1b2d" opacity="0.92" filter="url(#shadow)"/>

  <!-- Friendly 'claw' / mascot -->
  <!-- Body -->
  <ellipse cx="512" cy="560" rx="220" ry="180" fill="#0b2a3a" stroke="#2dd4bf" stroke-width="10"/>

  <!-- Eyes -->
  <circle cx="445" cy="525" r="26" fill="#e2e8f0"/>
  <circle cx="579" cy="525" r="26" fill="#e2e8f0"/>
  <circle cx="452" cy="532" r="11" fill="#0b1220"/>
  <circle cx="586" cy="532" r="11" fill="#0b1220"/>

  <!-- Smile -->
  <path d="M 455 610 C 490 650 534 650 569 610" fill="none" stroke="#e2e8f0" stroke-width="12" stroke-linecap="round"/>

  <!-- Left claw -->
  <path d="M 260 560
           C 230 510 248 450 300 430
           C 345 413 392 445 392 492
           C 392 525 370 548 345 565
           C 378 580 392 610 380 640
           C 360 690 290 705 250 660
           C 222 628 230 590 260 560 Z"
        fill="url(#claw)" opacity="0.95"/>

  <!-- Right claw (mirror) -->
  <path d="M 764 560
           C 794 510 776 450 724 430
           C 679 413 632 445 632 492
           C 632 525 654 548 679 565
           C 646 580 632 610 644 640
           C 664 690 734 705 774 660
           C 802 628 794 590 764 560 Z"
        fill="url(#claw)" opacity="0.95"/>

  <!-- Antenna / spark (AI 느낌) -->
  <path d="M 512 330 L 512 390" stroke="#94a3b8" stroke-width="10" stroke-linecap="round"/>
  <circle cx="512" cy="310" r="22" fill="#a78bfa"/>
  <circle cx="512" cy="310" r="10" fill="#fef08a"/>

  <!-- Name -->
  <text x="512" y="875" text-anchor="middle" font-family="ui-sans-serif, -apple-system, system-ui, Segoe UI, Roboto" font-size="72" fill="#e2e8f0" letter-spacing="2">공영삼</text>
  <text x="512" y="935" text-anchor="middle" font-family="ui-sans-serif, -apple-system, system-ui, Segoe UI, Roboto" font-size="34" fill="#94a3b8">youngsam_bot</text>
</svg>
