<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hyunho War Room</title>
  <style>
    :root{--bg:#0b1020;--card:#111827;--line:#243042;--txt:#e5e7eb;--mut:#94a3b8;--up:#22c55e;--dn:#ef4444;--pri:#3b82f6}
    *{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--txt);font-family:Inter, -apple-system, BlinkMacSystemFont,'Segoe UI',sans-serif}
    .wrap{padding:12px;display:grid;gap:10px;grid-template-columns:1.3fr 1fr}
    .card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:10px}
    .full{grid-column:1/-1}
    .topbar{display:grid;grid-template-columns:2fr 1fr 1fr 1fr 1fr;gap:8px}
    .metric{background:#0f172a;border:1px solid #1f2a3a;border-radius:10px;padding:8px}
    .metric .k{font-size:11px;color:var(--mut)} .metric .v{font-weight:700;margin-top:3px}
    .up{color:var(--up)} .dn{color:var(--dn)}
    .toolbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
    input{background:#0f172a;color:var(--txt);border:1px solid #334155;border-radius:8px;padding:8px;min-width:220px}
    button{border:none;background:#1f2937;color:var(--txt);padding:7px 10px;border-radius:8px;cursor:pointer}
    button.primary{background:var(--pri)}
    .sub{font-size:12px;color:var(--mut)}
    .grid{display:grid;grid-template-columns:1.4fr 1fr;gap:10px}
    canvas{width:100%;height:300px;background:#0f172a;border-radius:8px;border:1px solid #1f2937}
    .book-row{display:grid;grid-template-columns:50px 1fr 75px 1fr;gap:5px;align-items:center;font-size:12px;padding:3px 0;border-bottom:1px solid #1a2230}
    .bar{height:16px;border-radius:4px;background:#1f2937;position:relative;overflow:hidden}
    .bar>i{position:absolute;inset:0 auto 0 0;background:#7f1d1d99}.bar.bid>i{background:#14532d99}
    .tabs{display:flex;gap:6px;margin-bottom:8px}
    .tab{padding:6px 10px;border-radius:999px;background:#1f2937;font-size:12px}
    .tab.on{background:#2563eb}
    .panel{display:none}.panel.on{display:block}
    .list .item{padding:7px 0;border-bottom:1px solid #1f2937}
    a{color:#93c5fd;text-decoration:none}
    .signal{font-weight:700;font-size:18px}
    .badge{font-size:11px;background:#1f2937;border-radius:999px;padding:2px 8px;margin-right:6px}
    .hold-row{display:grid;grid-template-columns:1.4fr .6fr .8fr .8fr;gap:6px;padding:6px 0;border-bottom:1px solid #1f2937;font-size:12px}
    .idx-row{display:grid;grid-template-columns:110px 1fr 120px 90px;gap:8px;align-items:center;padding:6px 2px;border-bottom:1px solid #1f2937;font-size:13px}
    .spark{width:100%;height:24px}
    .macro-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .macro-group{background:#0f172a;border:1px solid #1f2937;border-radius:10px;padding:8px}
    .macro-group h4{margin:0 0 6px;font-size:12px;color:#cbd5e1}
    .chip{font-size:11px;padding:2px 8px;border-radius:999px;background:#1f2937}
    .modal{position:fixed;inset:0;background:#0009;display:none;z-index:50;padding:20px;overflow:auto}
    .modal.on{display:block}
    .modal-card{max-width:1200px;margin:0 auto;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:10px}
    @media (max-width:1100px){.wrap,.grid{grid-template-columns:1fr}.topbar{grid-template-columns:1fr 1fr}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card full">
      <div class="toolbar">
        <input id="q" placeholder="종목명/코드 검색" value="에임드바이오"/>
        <button class="primary" id="searchBtn">검색</button>
        <button id="watchBtn">선택 종목 보기</button>
        <button id="openStockModal">차트/호가 열기</button>
        <div class="sub" id="selected">선택: 0009K0</div>
      </div>
      <div class="sub" id="searchResults" style="margin-top:8px"></div>
    </div>

    <div class="card full topbar" id="topbar"></div>

    <div class="card full">
      <h3 style="margin:0 0 8px">메인 매크로 보드 (라이브)</h3>
      <div id="macroMain" class="macro-grid"></div>
    </div>

    <div class="card full">
      <h3 style="margin:0 0 8px">내 보유 현황</h3>
      <div class="sub" id="pfMeta">-</div>
      <div id="portfolio"></div>
    </div>

    <div id="stockModal" class="modal">
      <div class="modal-card">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
          <h3 style="margin:0">종목 상세 (차트/호가)</h3>
          <button id="closeStockModal">닫기</button>
        </div>
        <div class="grid">
          <div class="card">
            <h3 style="margin:0 0 8px">실시간 차트</h3>
            <canvas id="chart" width="1200" height="300"></canvas>
            <div class="sub" id="chartMeta">-</div>
          </div>
          <div class="card">
            <h3 style="margin:0 0 8px">호가창 (토스형)</h3>
            <div id="bookMeta" class="sub">-</div>
            <div id="book"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="grid full">
      <div class="card">
        <div class="tabs">
          <button class="tab on" data-tab="news">확정 뉴스</button>
          <button class="tab" data-tab="intel">월드 인텔</button>
          <button class="tab" data-tab="live">유튜브 라이브 뉴스</button>
          <button class="tab" data-tab="community">종토방/커뮤(미확인)</button>
          <button class="tab" data-tab="war">전쟁/지정학</button>
          <button class="tab" data-tab="market">글로벌 마켓</button>
        </div>

        <div class="panel on list" id="panel-news"></div>
        <div class="panel list" id="panel-intel"></div>
        <div class="panel list" id="panel-live"></div>
        <div class="panel list" id="panel-community"></div>
        <div class="panel list" id="panel-war"></div>
        <div class="panel list" id="panel-market"></div>
      </div>

      <div class="card">
        <h3 style="margin:0 0 8px">장 상황 (지수 흐름 + 액션)</h3>
        <canvas id="idxChart" width="900" height="180"></canvas>
        <div class="sub" id="idxMeta">-</div>
        <hr style="border-color:#1f2937;opacity:.4"/>
        <div class="signal" id="signal">[대기]</div>
        <div class="sub" id="signalRange">예상 범위: -</div>
        <div id="signalReasons" class="sub" style="margin-top:8px"></div>
        <div style="margin-top:10px" class="chip" id="macroDecision">매크로 진단 로딩중...</div>
      </div>
    </div>
  </div>

<script>
let symbol='0009K0', name='에임드바이오', snap=null, chart=[], portfolio=null, macroSeries={}, lastMarkets={};
const fmt=n=>Number(n||0).toLocaleString('ko-KR');

function setTopbar(){
  if(!snap) return;
  const c=snap.changePct>=0?'up':'dn';
  const inv=snap.investor||{};
  document.getElementById('topbar').innerHTML = `
    <div class='metric'><div class='k'>${name} (${symbol})</div><div class='v'>${fmt(snap.price)}원 <span class='${c}'>${snap.changePct}%</span></div></div>
    <div class='metric'><div class='k'>거래량</div><div class='v'>${fmt(snap.volume)}</div></div>
    <div class='metric'><div class='k'>투자자(개/외/기)</div><div class='v'>${fmt(inv.personal)} / ${fmt(inv.foreign)} / ${fmt(inv.inst)}</div></div>
    <div class='metric'><div class='k'>프로그램</div><div class='v ${snap.program.netQty>=0?'up':'dn'}'>${fmt(snap.program.netQty)}주</div></div>
    <div class='metric'><div class='k'>기타법인 추정</div><div class='v'>${fmt(inv.otherEst)}</div></div>`;
}

function drawChart(rows){
  const c=document.getElementById('chart'), ctx=c.getContext('2d');
  ctx.clearRect(0,0,c.width,c.height);
  if(!rows?.length) return;
  const highs=rows.map(r=>r.h).filter(Boolean), lows=rows.map(r=>r.l).filter(Boolean), vols=rows.map(r=>r.v||0);
  if(!highs.length || !lows.length) return;
  const min=Math.min(...lows), max=Math.max(...highs), maxV=Math.max(1,...vols);
  const pad=24, priceTop=pad, priceBottom=c.height*0.72, volTop=c.height*0.76, volBottom=c.height-pad;
  const yv=v=>priceBottom-((v-min)/(Math.max(1,max-min)))*(priceBottom-priceTop);
  ctx.strokeStyle='#1f2937'; ctx.strokeRect(0,0,c.width,c.height);
  const w=Math.max(2, (c.width-pad*2)/Math.max(1,rows.length)*0.6);
  rows.forEach((r,i)=>{
    const x=pad+i*(c.width-pad*2)/Math.max(1,rows.length-1);
    const yo=yv(r.o), yc=yv(r.c), yh=yv(r.h), yl=yv(r.l);
    const up=r.c>=r.o;
    ctx.strokeStyle=up?'#22c55e':'#ef4444';
    ctx.beginPath(); ctx.moveTo(x,yh); ctx.lineTo(x,yl); ctx.stroke();
    ctx.fillStyle=up?'#14532d':'#7f1d1d';
    const y=Math.min(yo,yc), h=Math.max(2,Math.abs(yc-yo));
    ctx.fillRect(x-w/2,y,w,h);
    const vh=((r.v||0)/maxV)*(volBottom-volTop);
    ctx.fillStyle=up?'#166534aa':'#991b1baa';
    ctx.fillRect(x-w/2, volBottom-vh, w, vh);
  });
  ctx.fillStyle='#9ca3af'; ctx.font='12px sans-serif';
  ctx.fillText(`1분봉(캔들+거래량) · 고점 ${fmt(max)} / 저점 ${fmt(min)} · 최근 ${rows.length}봉`, 10, 16);
  const first=rows[0].c, last=rows[rows.length-1].c;
  document.getElementById('chartMeta').textContent = `최근 추세: ${last>first?'상승':'하락/횡보'} · 업데이트 ${new Date().toLocaleTimeString('ko-KR')}`;
}

function drawBook(s){
  if(!s?.orderbook) return;
  document.getElementById('bookMeta').textContent = `총매도 ${fmt(s.orderbook.totalAsk)} / 총매수 ${fmt(s.orderbook.totalBid)} · asOf ${s.asOf||'-'}`;
  const maxQ=Math.max(1,...s.orderbook.levels.map(x=>Math.max(x.askQty,x.bidQty)));
  document.getElementById('book').innerHTML=s.orderbook.levels.slice(0,10).map(l=>`
    <div class='book-row'>
      <div>${l.n}</div>
      <div class='bar'><i style='width:${Math.round((l.askQty/maxQ)*100)}%'></i></div>
      <div>${fmt(l.ask||0)}</div>
      <div class='bar bid'><i style='width:${Math.round((l.bidQty/maxQ)*100)}%'></i></div>
    </div>`).join('');
}

function setSignal(){
  if(!snap || !chart.length) return;
  const last=chart[chart.length-1].c, prev=chart[Math.max(0,chart.length-6)].c;
  const ob=(snap.orderbook.totalBid||0)-(snap.orderbook.totalAsk||0);
  let sig='[대기]', range='';
  if(last>prev && ob>0 && snap.program.netQty>0){sig='[진입 가능]'; range=`예상 범위: ${fmt(last)} ~ ${fmt(last+400)}`}
  else if(last<prev && snap.price<60000){sig='[청산/축소]'; range=`예상 범위: ${fmt(last-400)} ~ ${fmt(last)}`}
  else {range=`예상 범위: ${fmt(last-300)} ~ ${fmt(last+300)}`}
  document.getElementById('signal').textContent=sig;
  document.getElementById('signalRange').textContent=range;
  document.getElementById('signalReasons').innerHTML=`- 5틱 추세: ${last>prev?'상승':'하락/횡보'}<br>- 호가 우위: ${ob>=0?'매수':'매도'}<br>- 프로그램: ${snap.program.netQty>=0?'순매수':'순매도'}`;
}

async function loadSnapshot(){
  const j=await fetch(`/api/snapshot?symbol=${symbol}`).then(r=>r.json());
  if(j.ok){snap=j.data; setTopbar(); drawBook(snap); setSignal();}
}
async function loadChart(){
  const j=await fetch(`/api/chart?symbol=${symbol}`).then(r=>r.json());
  if(j.ok){chart=j.data||[]; drawChart(chart); setSignal();}
}

async function loadPortfolio(){
  const j=await fetch('/api/portfolio').then(r=>r.json());
  const meta=document.getElementById('pfMeta'); const el=document.getElementById('portfolio');
  if(!j.ok){ meta.textContent=`보유현황 로드 실패: ${j.error}`; el.innerHTML=''; return; }
  portfolio=j.data;
  meta.textContent=`순자산 ${fmt(portfolio.account.nassAmt)} / 예수금 ${fmt(portfolio.account.dncaTotAmt)} / 평가금액 ${fmt(portfolio.account.evluAmtSmtl)} · ${new Date(j.updatedAt).toLocaleTimeString('ko-KR')}`;
  if(!(portfolio.holdings||[]).length){ el.innerHTML='<div class="sub">보유 종목 없음</div>'; return; }
  el.innerHTML=(portfolio.holdings||[]).map(h=>`<div class='hold-row'><div><b>${h.name}</b> (${h.code})</div><div>${fmt(h.qty)}주</div><div>평단 ${fmt(h.avg)}</div><div class='${h.pnlPct>=0?'up':'dn'}'>${fmt(h.pnl)} (${h.pnlPct}%)</div></div>`).join('');
}

async function loadNews(){
  const j=await fetch(`/api/geopolitics`).then(r=>r.json());
  const el=document.getElementById('panel-news');
  if(!j.ok) return el.innerHTML=`<div class='item'>뉴스 로드 실패: ${j.error}</div>`;
  el.innerHTML=j.items.slice(0,8).map(x=>`<div class='item'><span class='badge'>FACT</span><a href='${x.link}' target='_blank'>${x.title}</a></div>`).join('');
  document.getElementById('panel-war').innerHTML=j.items.slice(0,8).map(x=>`<div class='item'><span class='badge'>${x.source}</span><a href='${x.link}' target='_blank'>${x.title}</a></div>`).join('');
}

async function loadIntel(){
  const j=await fetch('/api/intel').then(r=>r.json());
  const el=document.getElementById('panel-intel');
  if(!j.ok) return el.innerHTML=`<div class='item'>인텔 로드 실패: ${j.error}</div>`;
  el.innerHTML=j.items.slice(0,12).map(x=>`<div class='item'><span class='badge'>${x.source}</span><a href='${x.link}' target='_blank'>${x.title}</a></div>`).join('');
}

function loadLiveNews(){
  const channels = [
    { name:'YTN', liveUrl:'https://www.youtube.com/results?search_query=YTN+live' },
    { name:'연합뉴스TV', liveUrl:'https://www.youtube.com/results?search_query=%EC%97%B0%ED%95%A9%EB%89%B4%EC%8A%A4TV+live' },
    { name:'Reuters', liveUrl:'https://www.youtube.com/results?search_query=Reuters+live' },
    { name:'Bloomberg', liveUrl:'https://www.youtube.com/@BloombergTelevision/live' },
    { name:'Sky News', liveUrl:'https://www.youtube.com/@SkyNews/live' },
    { name:'Al Jazeera', liveUrl:'https://www.youtube.com/@aljazeeraenglish/live' }
  ];
  const el=document.getElementById('panel-live');
  el.innerHTML = `
    <div class='item sub'>채널 정책으로 사이트 내 임베드가 막힐 수 있어요. 아래는 검증 가능한 라이브 열기 링크입니다(YouTube에서 PiP 가능).</div>
    ${channels.map(c=>`
      <div class='item'>
        <span class='badge'>LIVE</span><b>${c.name}</b>
        <div style='margin-top:8px; display:flex; gap:8px; flex-wrap:wrap;'>
          <a href='${c.liveUrl}' target='_blank'><button>${c.name} 라이브 열기</button></a>
        </div>
      </div>
    `).join('')}
  `;
}

async function loadCommunity(){
  const j=await fetch(`/api/community?symbol=${symbol}`).then(r=>r.json());
  const el=document.getElementById('panel-community');
  if(!j.ok) return el.innerHTML=`<div class='item'>커뮤니티 로드 실패: ${j.error}</div>`;
  el.innerHTML=j.items.slice(0,8).map(x=>`<div class='item'><span class='badge'>미확인</span><a href='${x.link}' target='_blank'>${x.title}</a></div>`).join('');
}

function drawIndexChart(series){
  const c=document.getElementById('idxChart'), ctx=c.getContext('2d');
  ctx.clearRect(0,0,c.width,c.height);
  const keys=['KOSPI','KOSDAQ','S&P500','NASDAQ100','USDKRW','GOLD','WTI','NATGAS','SILVER','COPPER'];
  const present=keys.filter(k=>series?.[k]?.length);
  if(!present.length) return;
  const pad=20;
  ctx.strokeStyle='#1f2937'; ctx.strokeRect(0,0,c.width,c.height);
  const colors={KOSPI:'#a78bfa',KOSDAQ:'#14b8a6','S&P500':'#60a5fa','NASDAQ100':'#22c55e','USDKRW':'#f43f5e',GOLD:'#fbbf24',WTI:'#ef4444',NATGAS:'#06b6d4',SILVER:'#cbd5e1',COPPER:'#f97316'};

  // normalize each series to index 100 for overlay readability
  for(const k of present){
    const rows=series[k].slice(-60);
    const base=rows[0]?.close || 1;
    const vals=rows.map(r=> (r.close/base)*100);
    const min=Math.min(...vals), max=Math.max(...vals);
    const y=v=>(c.height-pad)-((v-(min-2))/(Math.max(1,(max+2)-(min-2))))*(c.height-pad*2);
    ctx.strokeStyle=colors[k]||'#93c5fd'; ctx.lineWidth=1.8; ctx.beginPath();
    vals.forEach((v,i)=>{const x=pad+i*(c.width-pad*2)/Math.max(1,vals.length-1); const yy=y(v); if(i===0)ctx.moveTo(x,yy); else ctx.lineTo(x,yy);});
    ctx.stroke();
  }

  ctx.fillStyle='#9ca3af'; ctx.font='12px sans-serif';
  ctx.fillText('주요지수/원자재 (60일, 시작값=100 정규화)',10,16);
  const legend=present.map(k=>`${k}`).join(' · ');
  document.getElementById('idxMeta').textContent=`${legend} · 업데이트 ${new Date().toLocaleTimeString('ko-KR')}`;
}

async function loadMarketHistory(){
  const j=await fetch('/api/macro-history').then(r=>r.json());
  if(j.ok){
    macroSeries = j.series || {};
    drawIndexChart(macroSeries);
  }
}

function sparklineSvg(arr,color='#60a5fa'){
  if(!arr?.length) return '';
  const vals=arr.slice(-30);
  const min=Math.min(...vals), max=Math.max(...vals), w=120, h=24;
  const pts=vals.map((v,i)=>{
    const x=(i*(w-2))/Math.max(1,vals.length-1)+1;
    const y=(h-2)-((v-min)/(Math.max(1,max-min)))*(h-4)+1;
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  }).join(' ');
  return `<svg class='spark' viewBox='0 0 ${w} ${h}' preserveAspectRatio='none'><polyline fill='none' stroke='${color}' stroke-width='2' points='${pts}'/></svg>`;
}

async function loadMarkets(){
  const j=await fetch('/api/markets').then(r=>r.json());
  const el=document.getElementById('panel-market');
  const main=document.getElementById('macroMain');
  if(!j.ok){
    el.innerHTML=`<div class='item'>마켓 로드 실패: ${j.error}</div>`;
    main.innerHTML='';
    return;
  }
  const focus=['KOSPI','KOSDAQ','S&P500','NASDAQ100','DOW','USDKRW','WTI','GOLD','NATGAS','SILVER','COPPER'];
  const sorted=[...j.items].sort((a,b)=>focus.indexOf(a.symbol)-focus.indexOf(b.symbol));

  const normalized = sorted.map(m=>{
    const fallbackClose = (macroSeries[m.symbol]||[]).slice(-1)[0]?.close;
    let closeVal = (m.close===null || Number.isNaN(m.close)) ? fallbackClose : m.close;
    if ((closeVal===null || closeVal===undefined || Number.isNaN(closeVal)) && lastMarkets[m.symbol]) closeVal = lastMarkets[m.symbol];
    if (closeVal!==null && closeVal!==undefined && !Number.isNaN(closeVal)) lastMarkets[m.symbol] = closeVal;
    return { ...m, closeVal };
  });

  el.innerHTML=normalized.map(m=>{
    const pctTxt = (m.pct===null || Number.isNaN(m.pct)) ? '--' : `${m.pct>=0?'+':''}${Number(m.pct).toFixed(2)}%`;
    const chgTxt = (m.chg===null || Number.isNaN(m.chg)) ? '--' : `${m.chg>=0?'+':''}${fmt(Math.round(m.chg*100)/100)}`;
    const pxTxt = (m.closeVal===null || Number.isNaN(m.closeVal) || m.closeVal===undefined) ? '--' : fmt(m.closeVal);
    const cls = (m.pct===null || Number.isNaN(m.pct)) ? 'sub' : (m.pct>=0?'up':'dn');
    return `<div class='item'><b>${m.symbol}</b> ${pxTxt} <span class='${cls}'>${pctTxt}</span> <span class='sub'>(Δ ${chgTxt} | H:${m.high==null?'--':fmt(m.high)} L:${m.low==null?'--':fmt(m.low)}) ${m.stale?'· 지연':''}</span></div>`;
  }).join('');

  const groups = {
    '한국 시장': ['KOSPI','KOSDAQ','USDKRW'],
    '미국 지수': ['S&P500','NASDAQ100','DOW'],
    '원자재': ['WTI','GOLD','NATGAS','SILVER','COPPER']
  };

  const card = (m)=>{
    const s=(macroSeries[m.symbol]||[]).map(x=>x.close).filter(Boolean);
    const color=(m.pct===null || Number.isNaN(m.pct)) ? '#64748b' : (m.pct>=0?'#22c55e':'#ef4444');
    const pxTxt=(m.closeVal===null || Number.isNaN(m.closeVal) || m.closeVal===undefined) ? '--' : fmt(m.closeVal);
    const pctTxt=(m.pct===null || Number.isNaN(m.pct)) ? '--' : `${m.pct>=0?'+':''}${Number(m.pct).toFixed(2)}%`;
    return `<div class='idx-row'>
      <div><b>${m.symbol}</b>${m.stale?" <span class='sub'>(지연)</span>":''}</div>
      <div>${sparklineSvg(s,color)}</div>
      <div style='text-align:right'>${pxTxt}</div>
      <div class='${(m.pct===null || Number.isNaN(m.pct))?'sub':(m.pct>=0?'up':'dn')}' style='text-align:right'>${pctTxt}</div>
    </div>`;
  };

  main.innerHTML = Object.entries(groups).map(([title, syms])=>{
    const items = syms.map(sym => normalized.find(x=>x.symbol===sym)).filter(Boolean).map(card).join('');
    return `<div class='macro-group'><h4>${title}</h4>${items}</div>`;
  }).join('');

  const usDown = ['S&P500','NASDAQ100','DOW'].some(s=>{
    const m = normalized.find(x=>x.symbol===s);
    return m && Number(m.pct) < -1;
  });
  const krDown = ['KOSPI','KOSDAQ'].some(s=>{
    const m = normalized.find(x=>x.symbol===s);
    return m && Number(m.pct) < -1;
  });
  const risk = (usDown && krDown) ? '리스크오프(방어 우선)' : (usDown || krDown) ? '변동성 주의(분할 대응)' : '중립/안정';
  document.getElementById('macroDecision').textContent = `매크로 진단: ${risk}`;
}

async function search(){
  const q=document.getElementById('q').value.trim(); if(!q) return;
  const j=await fetch(`/api/search?q=${encodeURIComponent(q)}`).then(r=>r.json());
  document.getElementById('searchResults').innerHTML=(j.items||[]).slice(0,8).map(x=>`<button onclick="pick('${x.code}','${x.name}')">${x.name}(${x.code})</button>`).join(' ')||'검색 결과 없음';
}
window.pick=(code,nm)=>{symbol=code;name=nm;document.getElementById('selected').textContent=`선택: ${nm} (${code})`;};

for (const b of document.querySelectorAll('.tab')) b.onclick=()=>{
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on')); b.classList.add('on');
  const key=b.dataset.tab; document.querySelectorAll('.panel').forEach(p=>p.classList.remove('on'));
  document.getElementById(`panel-${key}`).classList.add('on');
};

document.getElementById('searchBtn').onclick=search;
document.getElementById('watchBtn').onclick=()=>{loadSnapshot();loadChart();loadPortfolio();loadCommunity();};
document.getElementById('openStockModal').onclick=()=>{document.getElementById('stockModal').classList.add('on');};
document.getElementById('closeStockModal').onclick=()=>{document.getElementById('stockModal').classList.remove('on');};
document.getElementById('stockModal').onclick=(e)=>{if(e.target.id==='stockModal') document.getElementById('stockModal').classList.remove('on');};

search();
loadSnapshot(); loadChart(); loadPortfolio(); loadNews(); loadIntel(); loadLiveNews(); loadCommunity(); loadMarkets(); loadMarketHistory();
setInterval(loadSnapshot, 800);
setInterval(loadChart, 2000);
setInterval(loadPortfolio, 5000);
setInterval(loadNews, 20000);
setInterval(loadIntel, 30000);
setInterval(loadCommunity, 30000);
setInterval(loadMarkets, 10000);
setInterval(loadMarketHistory, 90000);
</script>
